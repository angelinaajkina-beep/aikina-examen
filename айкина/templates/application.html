<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пассажирам.РФ - Оформление заявки</title>
    
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&family=PT+Sans:ital@1&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <img src="../img/logo2.svg" alt="Пассажирам.РФ" class="logo-img" style="height: 32px; width: auto; margin-right: 10px;">
                Пассажирам.РФ
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="profile.html">
                            <i class="bi bi-person-circle"></i> <span id="userNameNav">Иван Иванов</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html" onclick="localStorage.removeItem('currentUser')">
                            <i class="bi bi-box-arrow-right"></i>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-3">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card">
                    <div class="card-body">
                        <h2 class="text-center mb-4">
                            <i class="bi bi-plus-circle" style="color: #007bff;"></i> 
                            Оформление заявки
                        </h2>
                        
                        <div id="appErrors" class="alert alert-danger d-none">
                            <i class="bi bi-exclamation-triangle"></i>
                            <span id="appErrorMessage"></span>
                        </div>
                        
                        <form id="applicationForm">
                            <div class="mb-3">
                                <label class="form-label">Вид транспорта <span class="text-danger">*</span></label>
                                <select class="form-select" name="transport" required>
                                    <option value="">Выберите вид транспорта</option>
                                    <option value="Автобус">🚌 Автобус</option>
                                    <option value="Электробус">🔋 Электробус</option>
                                    <option value="Трамвай">🚋 Трамвай</option>
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Дата начала обучения <span class="text-danger">*</span></label>
                                <input type="text" id="startDate" class="form-control" 
                                       placeholder="ДД.ММ.ГГГГ" required>
                                <div class="invalid-feedback" id="dateError"></div>
                                <small class="text-muted">Формат: ДД.ММ.ГГГГ (например: 25.12.2026)</small>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label">Способ оплаты <span class="text-danger">*</span></label>
                                <select class="form-select" name="payment" required>
                                    <option value="">Выберите способ оплаты</option>
                                    <option value="Наличные">💰 Наличные</option>
                                    <option value="Банковская карта">💳 Банковская карта</option>
                                    <option value="Безналичный расчет">🏦 Безналичный расчет</option>
                                    <option value="Рассрочка">📊 Рассрочка</option>
                                </select>
                            </div>
                            
                            <!-- Кнопка без зеленого цвета, только голубой #007bff -->
                            <button type="submit" class="btn btn-primary w-100 py-2" style="background: #007bff; border: none; color: #ffffff; border-radius: 20px; font-weight: 600;">
                                <i class="bi bi-check2-circle"></i> Отправить заявку
                            </button>
                        </form>
                        
                        <p class="text-center mt-3 small-text">
                            <a href="profile.html" style="color: #007bff;">
                                <i class="bi bi-arrow-left"></i> Вернуться в личный кабинет
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <small>© 2026 Пассажирам.РФ</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../static/js/main.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const userData = JSON.parse(localStorage.getItem('currentUser') || '{}');
            if (userData.fullName) {
                document.querySelectorAll('#userNameNav').forEach(function(el) {
                    el.textContent = userData.fullName;
                });
            }
        });
    </script>
</body>
</html>
