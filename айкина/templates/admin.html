<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пассажирам.РФ - Админ-панель</title>
    
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&family=PT+Sans:ital@1&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <img src="../img/logo2.svg" alt="Пассажирам.РФ" class="logo-img" style="height: 32px; width: auto; margin-right: 10px;">
                Пассажирам.РФ
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="admin.html">
                            <i class="bi bi-shield-lock"></i> Администратор
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html" onclick="localStorage.removeItem('currentUser')">
                            <i class="bi bi-box-arrow-right"></i>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-3">
        <div class="row">
            <div class="col-12 col-lg-3">
                <div class="card animate-on-scroll">
                    <div class="card-body" id="adminStats">
                        <h3 class="mb-3">
                            <i class="bi bi-shield-lock" style="color: #007bff;"></i> Админ-панель
                        </h3>
                        <hr>
                        <div class="mb-3">
                            <p style="font-weight: 700; color: #0d47a1;">Статистика:</p>
                            <div class="d-flex flex-wrap gap-2">
                                <span class="badge badge-status-new">🆕 Новая: <span id="newCount">0</span></span>
                                <span class="badge badge-status-progress">📖 Идет: <span id="progressCount">0</span></span>
                                <span class="badge badge-status-completed">✅ Завершено: <span id="completedCount">0</span></span>
                            </div>
                        </div>
                        <hr>
                        <p class="small-text">Всего: <span id="totalCount">0</span> заявок</p>
                        <a href="profile.html" class="btn btn-outline-primary w-100 rounded-pill">
                            <i class="bi bi-person"></i> Мой профиль
                        </a>
                        <button class="btn btn-outline-secondary w-100 rounded-pill mt-2" onclick="location.reload()">
                            <i class="bi bi-arrow-clockwise"></i> Обновить
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="col-12 col-lg-9">
                <div class="card animate-on-scroll">
                    <div class="card-body">
                        <h2 class="mb-3">Все заявки</h2>
                        
                        <div class="table-responsive">
                            <table class="table table-hover table-striped">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Пользователь</th>
                                        <th>Транспорт</th>
                                        <th>Дата</th>
                                        <th>Статус</th>
                                        <th>Действия</th>
                                    </tr>
                                </thead>
                                <tbody id="adminTableBody">
                                    <!-- Заявки будут загружены динамически -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <small>© 2026 Пассажирам.РФ</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../static/js/main.js"></script>
</body>
</html>
