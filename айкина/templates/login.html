<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пассажирам.РФ - Вход</title>
    
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&family=PT+Sans:ital@1&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <img src="../img/logo2.svg" alt="Пассажирам.РФ" class="logo-img" style="height: 32px; width: auto; margin-right: 10px;">
                Пассажирам.РФ
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">Вход</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-primary btn-sm rounded-pill px-3 text-white" href="register.html">
                            Регистрация
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-3">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card animate-on-scroll">
                    <div class="card-body">
                        <h2 class="text-center mb-4">
                            <i class="bi bi-box-arrow-in-right" style="color: #007bff;"></i> Вход
                        </h2>
                        
                        <div id="loginErrors" class="alert alert-danger d-none">
                            <i class="bi bi-exclamation-triangle"></i>
                            <span id="loginErrorMessage"></span>
                        </div>
                        
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Логин</label>
                                <input type="text" id="loginInput" class="form-control" placeholder="Введите логин" required>
                                <div class="invalid-feedback" id="loginInputError"></div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Пароль</label>
                                <input type="password" id="passwordInput" class="form-control" placeholder="Введите пароль" required>
                                <div class="invalid-feedback" id="passwordInputError"></div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2">
                                <i class="bi bi-box-arrow-in-right"></i> Войти
                            </button>
                        </form>
                        
                        <p class="text-center mt-3 small-text">
                            Еще не зарегистрированы? 
                            <a href="register.html" style="color: #007bff;">Регистрация</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <small>© 2026 Пассажирам.РФ</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../static/js/main.js"></script>
</body>
</html>
