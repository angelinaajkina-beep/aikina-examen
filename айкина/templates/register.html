<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пассажирам.РФ - Регистрация</title>
    
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&family=PT+Sans:ital@1&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <i class="bi bi-bus-front"></i> Пассажирам.РФ
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">Вход</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-primary btn-sm rounded-pill px-3 text-white" href="register.html">
                            Регистрация
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-3">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card animate-on-scroll">
                    <div class="card-body">
                        <h2 class="text-center mb-4">
                            <i class="bi bi-person-plus" style="color: #007bff;"></i> Регистрация
                        </h2>
                        
                        <div id="registerErrors" class="alert alert-danger d-none">
                            <i class="bi bi-exclamation-triangle"></i>
                            <span id="errorMessage"></span>
                        </div>
                        
                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label">Логин <span class="text-danger">*</span></label>
                                <input type="text" id="login" class="form-control" 
                                       placeholder="Латиница + цифры, мин. 6 символов" required>
                                <div class="invalid-feedback" id="loginError"></div>
                                <small class="text-muted">Только латиница и цифры, минимум 6 символов</small>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Пароль <span class="text-danger">*</span></label>
                                <input type="password" id="password" class="form-control" 
                                       placeholder="Минимум 8 символов" required>
                                <div class="invalid-feedback" id="passwordError"></div>
                                <small class="text-muted" id="passwordHelp">Введите пароль (мин. 8 символов)</small>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">ФИО <span class="text-danger">*</span></label>
                                <input type="text" id="fullName" class="form-control" placeholder="Иванов Иван Иванович" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Дата рождения <span class="text-danger">*</span></label>
                                <input type="date" id="birthDate" class="form-control" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Контактный телефон <span class="text-danger">*</span></label>
                                <input type="tel" id="phone" class="form-control" placeholder="+7 (XXX) XXX-XX-XX" required>
                                <div class="invalid-feedback" id="phoneError"></div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">E-mail <span class="text-danger">*</span></label>
                                <input type="email" id="email" class="form-control" placeholder="example@mail.ru" required>
                                <div class="invalid-feedback" id="emailError"></div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2">
                                <i class="bi bi-check-circle"></i> Зарегистрироваться
                            </button>
                        </form>
                        
                        <p class="text-center mt-3 small-text">
                            Уже есть аккаунт? 
                            <a href="login.html" style="color: #007bff;">Войти</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <small>© 2026 Пассажирам.РФ</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../static/js/main.js"></script>
</body>
</html>
