<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пассажирам.РФ - Личный кабинет</title>
    
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&family=PT+Sans:ital@1&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <img src="../img/logo2.svg" alt="Пассажирам.РФ" style="height: 32px; width: auto; margin-right: 10px;">
                Пассажирам.РФ
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="profile.html">
                            <i class="bi bi-person-circle"></i> <span id="userNameNav">Гость</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html" onclick="localStorage.removeItem('currentUser')">
                            <i class="bi bi-box-arrow-right"></i>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-3">
        <!-- Слайдер -->
        <div class="swiper mb-4">
            <div class="swiper-wrapper">
                <div class="swiper-slide" style="background-image: url('../img/avtobys.jpg'); background-size: cover; background-position: center;">
                    <div class="slide-overlay">
                        <div class="slide-content text-center p-3">
                            <i class="bi bi-mortarboard" style="font-size: 30px; color: #ffffff;"></i>
                            <h4 style="color: #ffffff; margin-top: 4px;">Обучение водителей</h4>
                            <p style="color: #ffffff; opacity: 0.8; font-size: 12px;">Повышайте квалификацию</p>
                        </div>
                    </div>
                </div>
                <div class="swiper-slide" style="background-image: url('../img/electro.jpg'); background-size: cover; background-position: center;">
                    <div class="slide-overlay">
                        <div class="slide-content text-center p-3">
                            <i class="bi bi-award" style="font-size: 30px; color: #ffffff;"></i>
                            <h4 style="color: #ffffff; margin-top: 4px;">Получите права</h4>
                            <p style="color: #ffffff; opacity: 0.8; font-size: 12px;">Категория D, D1, E</p>
                        </div>
                    </div>
                </div>
                <div class="swiper-slide" style="background-image: url('../img/1_large.png'); background-size: cover; background-position: center;">
                    <div class="slide-overlay">
                        <div class="slide-content text-center p-3">
                            <i class="bi bi-building" style="font-size: 30px; color: #ffffff;"></i>
                            <h4 style="color: #ffffff; margin-top: 4px;">Трудоустройство</h4>
                            <p style="color: #ffffff; opacity: 0.8; font-size: 12px;">Помощь в трудоустройстве</p>
                        </div>
                    </div>
                </div>
                <div class="swiper-slide" style="background-image: url('../img/scale_1200.png'); background-size: cover; background-position: center;">
                    <div class="slide-overlay">
                        <div class="slide-content text-center p-3">
                            <i class="bi bi-people" style="font-size: 30px; color: #ffffff;"></i>
                            <h4 style="color: #ffffff; margin-top: 4px;">Сообщество</h4>
                            <p style="color: #ffffff; opacity: 0.8; font-size: 12px;">Общайтесь с коллегами</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="swiper-pagination"></div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>

        <div class="row">
            <div class="col-12 col-lg-4">
                <div class="card">
                    <div class="card-body">
                        <h3 class="mb-3">
                            <i class="bi bi-person-circle" style="color: #007bff;"></i> 
                            <span id="userName">Гость</span>
                        </h3>
                        <hr>
                        <p><strong>Логин:</strong> <span id="userLogin">—</span></p>
                        <p><strong>Email:</strong> <span id="userEmail">—</span></p>
                        <p><strong>Телефон:</strong> <span id="userPhone">—</span></p>
                        <p><strong>Дата рождения:</strong> <span id="userBirthDate">—</span></p>
                        <p><strong>Зарегистрирован:</strong> <span id="userRegDate">—</span></p>
                    </div>
                </div>
                <div class="d-grid gap-2 mt-3">
                    <a href="application.html" class="btn btn-primary py-2">
                        <i class="bi bi-plus-circle"></i> Новая заявка
                    </a>
                </div>
            </div>
            
            <div class="col-12 col-lg-8">
                <ul class="nav nav-tabs" id="profileTabs" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#applications">
                            <i class="bi bi-list-check"></i> Мои заявки (<span id="appsCount">0</span>)
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#feedbacks">
                            <i class="bi bi-star"></i> Мои отзывы (<span id="fbCount">0</span>)
                        </button>
                    </li>
                </ul>
                
                <div class="tab-content mt-3">
                    <div class="tab-pane fade show active" id="applications">
                        <div id="applicationsContainer"></div>
                    </div>
                    <div class="tab-pane fade" id="feedbacks">
                        <div id="feedbacksContainer"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <small>© 2026 Пассажирам.РФ</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="../static/js/main.js"></script>
</body>
</html>
